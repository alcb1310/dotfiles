general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    # after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 60                                  # 1min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = 10                                 # 10sec
    on-timeout = brightnessctl -s set 900        # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -s set 1500        # monitor backlight restore.
}

listener {
    timeout = 20                                 # 10sec
    on-timeout = brightnessctl -s set 600        # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -s set 1500        # monitor backlight restore.
}

listener {
    timeout = 30                                 # 10sec
    on-timeout = brightnessctl -s set 200        # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -s set 1500        # monitor backlight restore.
}

listener {
    timeout = 30                                 # 10sec
    on-timeout = brightnessctl -s set 10        # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -s set 1500        # monitor backlight restore.
}

listener {
    timeout = 300                                 # 5min
    on-timeout = systemctl suspend                # suspend pc
}
