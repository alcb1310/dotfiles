[default_session]
startup_command = "nvim"

[[session]]
name="tmux config"
path="~/dotfiles/.config/tmux"
startup_command="nvim tmux.conf"

[[session]]
name="sesh config"
path="~/dotfiles/.config/sesh"
startup_command="nvim sesh.toml"

[[session]]
name="neovim config"
path="~/dotfiles/.config/nvim"
startup_command="nvim -c ':Telescope find_files'"

[[session]]
name="budget control application"
path="~/go/src/github.com/alcb130/bca/master"
startup_command="nvim -c ':Telescope find_files'"
