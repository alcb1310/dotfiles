[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[window]
decorations = "None"
startup_mode = "Maximized"
option_as_alt = "OnlyLeft"
opacity = 0.92

[window.padding]
x = 5
y = 5

[mouse]
hide_when_typing = true

