import = ["/home/andres/.config/alacritty/themes/themes/material_theme.toml"]

[cursor.style]
blinking = "Off"
shape = "Block"

[env]
TERM = "alacritty"

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[window]
decorations = "Full"
 opacity = 0.8
 # opacity = 1.0
startup_mode = "Maximized"
option_as_alt = "OnlyLeft"

[window.padding]
x = 5
y = 5
